<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa Municipal — Ceará (Projetos)</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3249;
      --text: #e2e4ef;
      --muted: #8b8fa8;
      --accent: #7c6ff7;
      --radius: 10px;
      --panel-w: 300px;
      --header-h: 54px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── header ── */
    header {
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 14px;
      flex-shrink: 0;
      z-index: 1000;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
    }

    header h1 span {
      color: var(--muted);
      font-weight: 400;
    }

    /* ── busca ── */
    .search-wrap {
      position: relative;
      flex: 0 0 210px;
    }

    #busca {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      padding: 7px 12px 7px 32px;
      outline: none;
      transition: border-color .2s;
    }

    #busca:focus {
      border-color: var(--accent);
    }

    #busca::placeholder {
      color: var(--muted);
    }

    #busca-resultados {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      z-index: 9999;
      max-height: 220px;
      overflow-y: auto;
      display: none;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .5);
    }

    .busca-item {
      padding: 9px 12px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }

    .busca-item:last-child {
      border-bottom: none;
    }

    .busca-item:hover {
      background: var(--surface2);
    }

    .busca-item .ibge {
      color: var(--muted);
      font-size: 11px;
      font-family: monospace;
    }

    /* ── botão reload ── */
    #btn-reload {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 12px;
      padding: 6px 12px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
      white-space: nowrap;
    }

    #btn-reload:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    #btn-reload:disabled {
      opacity: .5;
      cursor: default;
    }

    #btn-reload.loading .ri {
      animation: spin .6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .ri {
      display: inline-block;
      font-size: 15px;
      line-height: 1;
    }

    /* ── layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── mapa ── */
    #map {
      flex: 1;
      background: #090c14;
    }

    .leaflet-tile-pane {
      filter: brightness(0.8) saturate(0.5);
    }

    /* ── tooltip leaflet ── */
    .leaflet-tooltip {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 7px !important;
      color: var(--text) !important;
      font-size: 12px !important;
      padding: 8px 12px !important;
      box-shadow: 0 4px 14px rgba(0, 0, 0, .5) !important;
      pointer-events: none !important;
      max-width: 280px !important;
    }

    .leaflet-tooltip::before {
      display: none !important;
    }

    .tt-nome {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .tt-ibge {
      color: var(--muted);
      font-size: 11px;
      font-family: monospace;
    }

    .tt-status {
      margin-top: 4px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .tt-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tt-resumo {
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.5;
    }

    .tt-resumo-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
    }

    .tt-resumo-divider {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--border);
    }

    /* ── painel lateral ── */
    #painel {
      width: var(--panel-w);
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .painel-titulo {
      padding: 14px 16px 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .filtro-limpar {
      font-size: 11px;
      color: var(--accent);
      cursor: pointer;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
      display: none;
    }

    .filtro-limpar.visivel {
      display: block;
    }

    /* ── legenda / filtro ── */
    #legenda-lista {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }

    .legenda-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 6px 8px;
      border-radius: 7px;
      margin-bottom: 3px;
      cursor: pointer;
      transition: background .12s, opacity .15s;
      user-select: none;
      border: 1px solid transparent;
    }

    .legenda-item:hover {
      background: var(--surface2);
    }

    .legenda-item.ativo {
      background: var(--surface2);
      border-color: var(--border);
    }

    .legenda-item.inativo {
      opacity: .35;
    }

    .legenda-cor {
      width: 13px;
      height: 13px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .legenda-label {
      font-size: 13px;
      flex: 1;
    }

    .legenda-count {
      font-size: 11px;
      color: var(--muted);
      background: var(--bg);
      padding: 1px 6px;
      border-radius: 10px;
      font-family: monospace;
    }

    /* ── seção de filtros avançados ── */
    #filtros-avancados {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }

    .filtro-toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .filtro-toggle-label {
      font-size: 12px;
      color: var(--text);
      flex: 1;
    }

    .filtro-switch {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .filtro-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .filtro-switch-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--surface2);
      border: 1px solid var(--border);
      transition: .3s;
      border-radius: 20px;
    }

    .filtro-switch-slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 2px;
      bottom: 2px;
      background-color: var(--text);
      transition: .3s;
      border-radius: 50%;
    }

    .filtro-switch input:checked + .filtro-switch-slider {
      background-color: var(--accent);
      border-color: var(--accent);
    }

    .filtro-switch input:checked + .filtro-switch-slider:before {
      transform: translateX(16px);
    }

    .filtro-dropdown {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 12px;
      padding: 6px 8px;
      margin-bottom: 6px;
      outline: none;
    }

    .filtro-dropdown:focus {
      border-color: var(--accent);
    }

    .filtro-dropdown option {
      background: var(--surface);
      color: var(--text);
    }

    /* ── card município / regional ── */
    #card-detalhes {
      padding: 16px;
      flex: 1;
    }

    .placeholder {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      margin-top: 32px;
      line-height: 1.7;
    }

    .placeholder em {
      font-style: normal;
      font-size: 22px;
      display: block;
      margin-bottom: 8px;
    }

    .mun-nome {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .mun-subtitulo {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .mun-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 20px;
    }

    .mun-badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .mun-info-row {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .mun-info-row span {
      color: var(--text);
    }

    .mun-resumo-status {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .mun-resumo-status-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      padding: 3px 0;
    }

    .sem-dado {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
    }

    /* ── status bar ── */
    #statusbar {
      height: 28px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 18px;
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .dot-ok {
      color: #1D9E75;
    }

    .dot-err {
      color: #E24B4A;
    }
  </style>
</head>

<body>

  <header>
    <h1>Mapa Municipal <span>/ Ceará — Projetos</span></h1>

    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="busca" type="text" placeholder="Buscar município ou regional..." autocomplete="off">
      <div id="busca-resultados"></div>
    </div>

    <button id="btn-reload">
      <span class="ri">↻</span>
      Recarregar dados
    </button>
  </header>

  <div class="main">
    <div id="map"></div>

    <div id="painel">
      <div class="painel-titulo">
        Status (Filtro)
        <span class="filtro-limpar" id="filtro-status-limpar" onclick="limparFiltro('status')">Limpar</span>
      </div>
      <div id="legenda-lista"></div>

      <div class="painel-titulo" style="margin-top:0">
        Tipo (Filtro)
        <span class="filtro-limpar" id="filtro-tipo-limpar" onclick="limparFiltro('tipo')">Limpar</span>
      </div>
      <div id="tipo-lista"></div>

      <div class="painel-titulo">
        Filtros Regionais
        <span class="filtro-limpar" id="filtro-regionais-limpar" onclick="limparFiltrosRegionais()">Limpar</span>
      </div>
      <div id="filtros-avancados">
        <div class="filtro-toggle-row">
          <span class="filtro-toggle-label">Mostrar Regionais</span>
          <label class="filtro-switch">
            <input type="checkbox" id="toggle-regionais" checked onchange="toggleRegionais()">
            <span class="filtro-switch-slider"></span>
          </label>
        </div>
        <select id="filtro-status-regional" class="filtro-dropdown" onchange="aplicarFiltroStatusRegional()">
          <option value="">Todos os status</option>
        </select>
        <select id="filtro-tecnico-regional" class="filtro-dropdown" onchange="aplicarFiltroTecnicoRegional()">
          <option value="">Todos os técnicos</option>
        </select>
      </div>

      <div id="card-detalhes">
        <div class="placeholder">
          <em>🗺️</em>
          Clique em um município ou regional<br>para ver detalhes
        </div>
      </div>
    </div>
  </div>

  <div id="statusbar">
    <span id="sb-conn"><span class="dot-err">●</span> Conectando...</span>
    <span id="sb-total"></span>
    <span id="sb-hora"></span>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ════════════════════════════════════════════════════════════
    // CONFIG
    // ════════════════════════════════════════════════════════════
    const API = "http://localhost:5000";

    // ════════════════════════════════════════════════════════════
    // ESTADO
    // ════════════════════════════════════════════════════════════
    let dadosPlanilha = {};        // { "2304400": { status, cor, tipo, municipio, regiao, os[], tecnicos[], resumo_status{} } }
    let dadosRegionais = {};       // { "Sul": { regiao, cor, status, os[], tecnicos[], resumo_status{}, total_os, total_tecnicos, municipios[] } }
    let geojsonData = null;
    let geojsonLayer = null;
    let featureLayers = {};        // { ibge: leaflet_layer }
    let regionaisCeData = null;
    let regionaisCeLayer = null;
    let regionaisCeFeatureLayers = {};  // { "Sul": layer }
    let selectedLayer = null;
    let selectedKey = null;        // ibge ou nome da regional
    let selectedType = null;       // "municipio" ou "regional"
    let layerRegionaisVisivel = true;
    let filtros = { status: null, tipo: null };
    let filtroStatusRegional = "";
    let filtroTecnicoRegional = "";
    let listaTodosTecnicos = [];

    // ════════════════════════════════════════════════════════════
    // MAPA
    // ════════════════════════════════════════════════════════════
    const map = L.map("map", { zoomControl: true, attributionControl: false });

    L.tileLayer(
      "https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png",
      { subdomains: "abcd", maxZoom: 15 }
    ).addTo(map);

    const CE_BOUNDS = L.latLngBounds(L.latLng(-7.86, -41.43), L.latLng(-2.78, -37.25));
    map.fitBounds(CE_BOUNDS);
    map.setMaxBounds(CE_BOUNDS.pad(0.35));

    map.on("click", () => fecharBusca());

    // ════════════════════════════════════════════════════════════
    // FUNÇÕES AUXILIARES
    // ════════════════════════════════════════════════════════════
    function extrairPropriedades(props) {
      const ibge = String(
        props.codigo_ibg ||
        props.CD_MUN ||
        props.codigo_ibge ||
        props.geocodigo ||
        props.CD_GEOCMU ||
        props.GEOCODIGO || ""
      ).trim().replace(/\.0$/, "").padStart(7, "0");

      const nome = props.Municipio ||
        props.NM_MUN ||
        props.nome ||
        props.NOME ||
        props.NM_MUNICIPIO || ibge;

      return { ibge, nome };
    }

    function chaveRegionalCe(props) {
      const regional = String(props.Regional || "").trim();
      if (!regional) return null;
      return regional;
    }

    // ════════════════════════════════════════════════════════════
    // ESTILO
    // ════════════════════════════════════════════════════════════
    function getEstilo(ibge, opcoes = {}) {
      const dado = dadosPlanilha[ibge];
      const cor = dado ? dado.cor : "#1e2236";
      const status = dado ? dado.status : "";
      const tipo = dado ? dado.tipo : "";

      const apagado = (
        (filtros.status !== null && status !== filtros.status) ||
        (filtros.tipo !== null && tipo !== filtros.tipo)
      );

      return {
        fillColor: cor,
        fillOpacity: apagado ? 0.08 : (opcoes.hover ? 0.92 : opcoes.selected ? 1 : 0.72),
        color: opcoes.selected ? "#7c6ff7" : "#0a0d16",
        weight: opcoes.selected ? 2.2 : opcoes.hover ? 1.4 : 0.6,
        opacity: apagado ? 0.3 : 1,
      };
    }

    function getEstiloRegionalCe(chave, opcoes = {}) {
      const dado = chave ? dadosRegionais[chave] : null;
      const cor = dado ? dado.cor : "#1e2236";
      const status = dado ? dado.status : "";

      // Filtro por status regional
      const apagadoStatus = (filtroStatusRegional && status !== filtroStatusRegional);

      // Filtro por técnico regional
      const tecnicos = dado ? dado.tecnicos : [];
      const apagadoTecnico = (filtroTecnicoRegional && !tecnicos.includes(filtroTecnicoRegional));

      const apagado = apagadoStatus || apagadoTecnico;

      return {
        fillColor: cor,
        fillOpacity: apagado ? 0.08 : (opcoes.hover ? 0.92 : opcoes.selected ? 1 : 0.78),
        color: opcoes.selected ? "#7c6ff7" : "#0a0d16",
        weight: opcoes.selected ? 2.2 : opcoes.hover ? 1.6 : 0.8,
        opacity: apagado ? 0.3 : 1,
      };
    }

    // ════════════════════════════════════════════════════════════
    // TOOLTIPS
    // ════════════════════════════════════════════════════════════
    function montarTooltipMunicipio(dado, nome, ibge) {
      const status = dado ? dado.status : "";
      const cor = dado ? dado.cor : "";
      const tipo = dado ? dado.tipo : "";
      const tecnicos = dado ? dado.tecnicos : [];
      const resumoStatus = dado ? dado.resumo_status : {};

      let statusHtml = "";
      if (status) {
        statusHtml = `<div class="tt-status">
          <span class="tt-dot" style="background:${cor}"></span>
          ${status}${tipo ? ` · ${tipo}` : ""}
        </div>`;
      } else {
        statusHtml = `<div class="tt-status" style="color:#8b8fa8">Sem dado</div>`;
      }

      let resumoHtml = "";
      if (tecnicos.length > 0 || Object.keys(resumoStatus).length > 0) {
        resumoHtml = `<div class="tt-resumo">`;
        if (tecnicos.length > 0) {
          resumoHtml += `<div>👥 ${tecnicos.length} técnico${tecnicos.length > 1 ? 's' : ''}</div>`;
        }
        if (Object.keys(resumoStatus).length > 0) {
          resumoHtml += `<div class="tt-resumo-divider">`;
          Object.entries(resumoStatus).forEach(([st, qtd]) => {
            const c = STATUS_CORES[st] || "#888";
            resumoHtml += `<div class="tt-resumo-row">
              <span class="tt-dot" style="background:${c};width:7px;height:7px"></span>
              <span style="color:${c}">${st}: ${qtd}</span>
            </div>`;
          });
          resumoHtml += `</div>`;
        }
        resumoHtml += `</div>`;
      }

      return `<div class="tt-nome">${nome}</div>
        <div class="tt-ibge">IBGE: ${ibge}</div>
        ${statusHtml}
        ${resumoHtml}`;
    }

    function montarTooltipRegionalCe(dado, nome) {
      if (!dado) {
        return `<div class="tt-nome">${nome}</div><div class="tt-status" style="color:#8b8fa8">Sem dado</div>`;
      }

      const status = dado.status || "";
      const cor = dado.cor || "";
      const totalTecnicos = dado.total_tecnicos || 0;
      const totalOs = dado.total_os || 0;
      const resumoStatus = dado.resumo_status || {};

      let resumoHtml = `<div class="tt-resumo">`;
      resumoHtml += `<div>👥 ${totalTecnicos} técnico${totalTecnicos !== 1 ? 's' : ''}</div>`;
      resumoHtml += `<div>📋 ${totalOs} OS${totalOs !== 1 ? '' : ''}</div>`;

      if (Object.keys(resumoStatus).length > 0) {
        resumoHtml += `<div class="tt-resumo-divider">`;
        Object.entries(resumoStatus).forEach(([st, qtd]) => {
          const c = STATUS_CORES[st] || "#888";
          resumoHtml += `<div class="tt-resumo-row">
            <span class="tt-dot" style="background:${c};width:7px;height:7px"></span>
            <span style="color:${c}">${st}: ${qtd}</span>
          </div>`;
        });
        resumoHtml += `</div>`;
      }
      resumoHtml += `</div>`;

      return `<div class="tt-nome">${nome}</div>
        <div class="tt-status"><span class="tt-dot" style="background:${cor}"></span>${status}</div>
        ${resumoHtml}`;
    }

    // ════════════════════════════════════════════════════════════
    // STATUS_CORES (local copy)
    // ════════════════════════════════════════════════════════════
    const STATUS_CORES = {
      "CADASTRO FINALIZADO": "#1D9E75",
      "EM ANDAMENTO":        "#CAA800",
      "CAMPO PARALISADO":    "#CB7841",
      "NAO INICIADO":        "#E24B4A",
    };
    const COR_SEM_DADO = "#B4B2A9";

    // ════════════════════════════════════════════════════════════
    // GEOJSON — MUNICÍPIOS
    // ════════════════════════════════════════════════════════════
    async function carregarGeojsonMunicipios() {
      try {
        console.log("Carregando GeoJSON municípios...");
        const r = await fetch("/municipios_ce.geojson");
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        
        console.log("Parseando GeoJSON (pode demorar)...");
        geojsonData = await r.json();
        console.log(`GeoJSON carregado: ${geojsonData.features.length} features`);

        geojsonLayer = L.geoJSON(geojsonData, {
          style: f => {
            const { ibge } = extrairPropriedades(f.properties);
            return getEstilo(ibge);
          },
          onEachFeature: (feature, layer) => {
            const { ibge, nome } = extrairPropriedades(feature.properties);
            featureLayers[ibge] = layer;

            layer.on("mouseover", function (e) {
              if (this !== selectedLayer) this.setStyle(getEstilo(ibge, { hover: true }));
              const dado = dadosPlanilha[ibge];
              this.bindTooltip(montarTooltipMunicipio(dado, nome, ibge), {
                sticky: true, direction: "top", offset: [0, -6], opacity: 1
              }).openTooltip(e.latlng);
            });

            layer.on("mouseout", function () {
              if (this !== selectedLayer) this.setStyle(getEstilo(ibge));
              this.closeTooltip();
            });

            layer.on("click", function () {
              selecionarMunicipio(ibge, nome, this);
            });
          },
        }).addTo(map);

        console.log("GeoJSON adicionado ao mapa, ajustando bounds...");
        try {
          const bounds = geojsonLayer.getBounds();
          if (bounds.isValid() && bounds.getNorth() > -90) {
            map.fitBounds(bounds, { padding: [50, 50] });
            console.log("Bounds ajustados com sucesso!");
          } else {
            console.warn("Bounds inválidos, usando bounds manuais do Ceará");
            map.setView([-5.5, -39.5], 7);
          }
        } catch (e) {
          console.error("Erro no fitBounds:", e);
          map.setView([-5.5, -39.5], 7);
        }
      } catch (e) {
        console.error("GeoJSON municípios:", e);
        setSb(false, "Erro ao carregar GeoJSON: " + e.message);
      }
    }

    // ════════════════════════════════════════════════════════════
    // GEOJSON — REGIONAIS CE
    // ════════════════════════════════════════════════════════════
    async function carregarRegionaisCe() {
      try {
        const r = await fetch("/regionais_ce.geojson");
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        regionaisCeData = await r.json();

        regionaisCeLayer = L.geoJSON(regionaisCeData, {
          style: f => {
            const chave = chaveRegionalCe(f.properties);
            return getEstiloRegionalCe(chave);
          },
          onEachFeature: (feature, layer) => {
            const chave = chaveRegionalCe(feature.properties);
            if (!chave) return;
            regionaisCeFeatureLayers[chave] = layer;

            layer.on("mouseover", function (e) {
              if (this !== selectedLayer) this.setStyle(getEstiloRegionalCe(chave, { hover: true }));
              const dado = dadosRegionais[chave];
              this.bindTooltip(montarTooltipRegionalCe(dado, chave), {
                sticky: true, direction: "top", offset: [0, -6], opacity: 1
              }).openTooltip(e.latlng);
            });

            layer.on("mouseout", function () {
              if (this !== selectedLayer) this.setStyle(getEstiloRegionalCe(chave));
              this.closeTooltip();
            });

            layer.on("click", function () {
              selecionarRegionalCe(chave, this);
            });
          },
        }).addTo(map);

        // Controla visibilidade
        if (!layerRegionaisVisivel) {
          map.removeLayer(regionaisCeLayer);
        }
      } catch (e) {
        console.error("Regionais CE GeoJSON:", e);
      }
    }

    // ════════════════════════════════════════════════════════════
    // SELEÇÃO
    // ════════════════════════════════════════════════════════════
    function selecionarMunicipio(ibge, nome, layer) {
      if (selectedLayer && selectedLayer !== layer) {
        if (selectedType === "municipio") {
          aplicarEstiloNormal(selectedLayer, selectedKey);
        } else if (selectedType === "regional") {
          regionaisCeLayer.resetStyle(selectedLayer);
          selectedLayer.setStyle(getEstiloRegionalCe(selectedKey));
        }
      }

      selectedLayer = layer;
      selectedKey = ibge;
      selectedType = "municipio";
      layer.setStyle(getEstilo(ibge, { selected: true }));

      map.flyToBounds(layer.getBounds(), { padding: [80, 80], duration: 0.6, maxZoom: 10 });

      const dado = dadosPlanilha[ibge];
      const status = dado ? dado.status : "";
      const cor = dado ? dado.cor : "";
      const tipo = dado ? dado.tipo : "";
      const regiao = dado ? dado.regiao : "";
      const tecnicos = dado ? dado.tecnicos : [];
      const resumoStatus = dado ? dado.resumo_status : {};

      let html = `<div class="mun-nome">${nome}</div>
        <div class="mun-subtitulo">IBGE: ${ibge}${regiao ? ` · Regional ${regiao}` : ""}</div>`;

      if (status) {
        html += `<div class="mun-badge" style="background:${cor}22; color:${cor}; border:1px solid ${cor}55">
          <span class="dot" style="background:${cor}"></span>${status}
        </div>`;
      }

      if (tipo) {
        html += `<div class="mun-info-row">Tipo: <span>${tipo}</span></div>`;
      }

      if (tecnicos.length > 0) {
        html += `<div class="mun-info-row">Técnicos: <span>${tecnicos.join(", ")}</span></div>`;
      }

      if (Object.keys(resumoStatus).length > 0) {
        html += `<div class="mun-resumo-status">`;
        Object.entries(resumoStatus).forEach(([st, qtd]) => {
          const c = STATUS_CORES[st] || "#888";
          html += `<div class="mun-resumo-status-item">
            <span class="dot" style="background:${c}"></span>
            <span style="color:${c}">${st}: ${qtd}</span>
          </div>`;
        });
        html += `</div>`;
      }

      if (!status && !tipo && tecnicos.length === 0) {
        html += `<div class="sem-dado">Sem dado na planilha</div>`;
      }

      document.getElementById("card-detalhes").innerHTML = html;
    }

    function selecionarRegionalCe(nome, layer) {
      if (selectedLayer && selectedLayer !== layer) {
        if (selectedType === "municipio") {
          aplicarEstiloNormal(selectedLayer, selectedKey);
        } else if (selectedType === "regional") {
          regionaisCeLayer.resetStyle(selectedLayer);
          selectedLayer.setStyle(getEstiloRegionalCe(selectedKey));
        }
      }

      selectedLayer = layer;
      selectedKey = nome;
      selectedType = "regional";
      layer.setStyle(getEstiloRegionalCe(nome, { selected: true }));

      map.flyToBounds(layer.getBounds(), { padding: [80, 80], duration: 0.5, maxZoom: 12 });

      const dado = dadosRegionais[nome];
      if (!dado) {
        document.getElementById("card-detalhes").innerHTML = `
          <div class="mun-nome">${nome}</div>
          <div class="mun-subtitulo">Regional do Ceará</div>
          <div class="sem-dado">Sem dado na planilha</div>`;
        return;
      }

      const status = dado.status || "";
      const cor = dado.cor || "";
      const totalTecnicos = dado.total_tecnicos || 0;
      const totalOs = dado.total_os || 0;
      const resumoStatus = dado.resumo_status || {};
      const tecnicos = dado.tecnicos || [];
      const municipios = dado.municipios || [];

      let html = `<div class="mun-nome">${nome}</div>
        <div class="mun-subtitulo">Regional do Ceará</div>`;

      if (status) {
        html += `<div class="mun-badge" style="background:${cor}22; color:${cor}; border:1px solid ${cor}55">
          <span class="dot" style="background:${cor}"></span>${status}
        </div>`;
      }

      html += `<div class="mun-info-row">Técnicos: <span>${totalTecnicos}</span></div>`;
      html += `<div class="mun-info-row">OS: <span>${totalOs}</span></div>`;
      html += `<div class="mun-info-row">Municípios: <span>${municipios.length}</span></div>`;

      if (tecnicos.length > 0) {
        html += `<div class="mun-info-row" style="margin-top:6px"><span style="font-size:11px">${tecnicos.join(", ")}</span></div>`;
      }

      if (Object.keys(resumoStatus).length > 0) {
        html += `<div class="mun-resumo-status">`;
        Object.entries(resumoStatus).forEach(([st, qtd]) => {
          const c = STATUS_CORES[st] || "#888";
          html += `<div class="mun-resumo-status-item">
            <span class="dot" style="background:${c}"></span>
            <span style="color:${c}">${st}: ${qtd}</span>
          </div>`;
        });
        html += `</div>`;
      }

      document.getElementById("card-detalhes").innerHTML = html;
    }

    function aplicarEstiloNormal(layer, ibge) {
      layer.setStyle(getEstilo(ibge));
    }

    // ════════════════════════════════════════════════════════════
    // DADOS DA API
    // ════════════════════════════════════════════════════════════
    async function carregarDados() {
      try {
        const [rMun, rReg] = await Promise.all([
          fetch(`${API}/municipios`),
          fetch(`${API}/regionais`)
        ]);

        if (!rMun.ok || !rReg.ok) throw new Error("API indisponível");

        dadosPlanilha = await rMun.json();
        dadosRegionais = await rReg.json();

        // Extrai lista única de técnicos para o filtro
        listaTodosTecnicos = [...new Set(
          Object.values(dadosRegionais).flatMap(d => d.tecnicos || [])
        )].sort();

        // Atualiza estilos municípios
        if (geojsonLayer) {
          geojsonLayer.eachLayer(layer => {
            if (!layer.feature) return;
            const { ibge } = extrairPropriedades(layer.feature.properties);
            if (layer === selectedLayer && selectedType === "municipio") {
              layer.setStyle(getEstilo(ibge, { selected: true }));
            } else {
              layer.setStyle(getEstilo(ibge));
            }
          });
        }

        // Atualiza estilos regionais
        if (regionaisCeLayer) {
          regionaisCeLayer.eachLayer(layer => {
            if (!layer.feature) return;
            const chave = chaveRegionalCe(layer.feature.properties);
            if (!chave) return;
            if (layer === selectedLayer && selectedType === "regional") {
              layer.setStyle(getEstiloRegionalCe(chave, { selected: true }));
            } else {
              layer.setStyle(getEstiloRegionalCe(chave));
            }
          });
        }

        renderizarLegenda();
        renderizarFiltrosRegionais();
        await atualizarSb();
        return true;
      } catch (e) {
        console.error("API:", e);
        setSb(false, "Servidor indisponível — execute server.py");
        return false;
      }
    }

    // ════════════════════════════════════════════════════════════
    // LEGENDA / FILTROS COMPARTILHADOS
    // ════════════════════════════════════════════════════════════
    function renderizarLegenda() {
      const contagem = {};
      Object.values(dadosPlanilha).forEach(d => {
        if (d.status) contagem[d.status] = (contagem[d.status] || 0) + 1;
      });

      let semDado = 0;
      if (geojsonData) {
        geojsonData.features.forEach(f => {
          const { ibge } = extrairPropriedades(f.properties);
          if (!dadosPlanilha[ibge]) semDado++;
        });
      }

      const container = document.getElementById("legenda-lista");
      container.innerHTML = "";
      Object.entries(contagem).forEach(([status, count]) => {
        const cor = STATUS_CORES[status] || "#888";
        container.appendChild(criarItemFiltro("status", status, cor, count));
      });
      if (semDado > 0) {
        container.appendChild(criarItemFiltro("status", "(sem dado)", "#1e2236", semDado, true));
      }

      renderizarTipos();
    }

    function renderizarTipos() {
      const contagem = {};
      Object.values(dadosPlanilha).forEach(d => {
        if (d.tipo) contagem[d.tipo] = (contagem[d.tipo] || 0) + 1;
      });

      const container = document.getElementById("tipo-lista");
      container.innerHTML = "";

      if (Object.keys(contagem).length === 0) {
        container.innerHTML = `<div style="padding:10px 12px;font-size:12px;color:var(--muted)">Sem dados de tipo</div>`;
        return;
      }

      Object.entries(contagem).forEach(([tipo, count]) => {
        container.appendChild(criarItemFiltro("tipo", tipo, "#5a5e7a", count));
      });
    }

    function criarItemFiltro(tipo, label, cor, count, isSemDado = false) {
      const div = document.createElement("div");
      div.className = "legenda-item";
      const ativo = tipo === "status" ? filtros.status === label || (filtros.status === null && isSemDado) : filtros.tipo === label;
      if (ativo) div.classList.add("ativo");

      div.innerHTML = `
        <span class="legenda-cor" style="background:${cor}"></span>
        <span class="legenda-label">${label}</span>
        <span class="legenda-count">${count}</span>`;

      div.onclick = () => aplicarFiltro(tipo, label);
      return div;
    }

    function aplicarFiltro(tipo, label) {
      const current = tipo === "status" ? filtros.status : filtros.tipo;
      if (current === label) {
        if (tipo === "status") filtros.status = null;
        else filtros.tipo = null;
      } else {
        if (tipo === "status") filtros.status = label;
        else filtros.tipo = label;
      }

      atualizarLegendaUI();
      reaplicarEstilos();

      const limparStatus = document.getElementById("filtro-status-limpar");
      const limparTipo = document.getElementById("filtro-tipo-limpar");
      if (filtros.status !== null) limparStatus.classList.add("visivel");
      else limparStatus.classList.remove("visivel");
      if (filtros.tipo !== null) limparTipo.classList.add("visivel");
      else limparTipo.classList.remove("visivel");
    }

    function limparFiltro(tipo) {
      if (tipo === "status") filtros.status = null;
      else filtros.tipo = null;
      atualizarLegendaUI();
      reaplicarEstilos();
      document.getElementById(`filtro-${tipo}-limpar`).classList.remove("visivel");
    }

    function atualizarLegendaUI() {
      document.querySelectorAll("#legenda-lista .legenda-item, #tipo-lista .legenda-item").forEach(el => {
        const label = el.querySelector(".legenda-label").textContent;
        const tipo = el.closest("#legenda-lista") ? "status" : "tipo";
        const current = tipo === "status" ? filtros.status : filtros.tipo;
        el.classList.toggle("ativo", current === label);
      });
    }

    function reaplicarEstilos() {
      if (geojsonLayer) {
        geojsonLayer.eachLayer(layer => {
          if (!layer.feature) return;
          const { ibge } = extrairPropriedades(layer.feature.properties);
          if (layer === selectedLayer && selectedType === "municipio") {
            layer.setStyle(getEstilo(ibge, { selected: true }));
          } else {
            layer.setStyle(getEstilo(ibge));
          }
        });
      }

      if (regionaisCeLayer) {
        regionaisCeLayer.eachLayer(layer => {
          if (!layer.feature) return;
          const chave = chaveRegionalCe(layer.feature.properties);
          if (!chave) return;
          if (layer === selectedLayer && selectedType === "regional") {
            layer.setStyle(getEstiloRegionalCe(chave, { selected: true }));
          } else {
            layer.setStyle(getEstiloRegionalCe(chave));
          }
        });
      }
    }

    // ════════════════════════════════════════════════════════════
    // FILTROS REGIONAIS AVANÇADOS
    // ════════════════════════════════════════════════════════════
    function renderizarFiltrosRegionais() {
      // Preenche dropdown de status
      const statusSelect = document.getElementById("filtro-status-regional");
      const statusList = [...new Set(Object.values(dadosRegionais).map(d => d.status).filter(Boolean))].sort();
      statusSelect.innerHTML = `<option value="">Todos os status</option>`;
      statusList.forEach(st => {
        const opt = document.createElement("option");
        opt.value = st;
        opt.textContent = st;
        statusSelect.appendChild(opt);
      });

      // Preenche dropdown de técnicos
      const tecSelect = document.getElementById("filtro-tecnico-regional");
      tecSelect.innerHTML = `<option value="">Todos os técnicos</option>`;
      listaTodosTecnicos.forEach(tec => {
        const opt = document.createElement("option");
        opt.value = tec;
        opt.textContent = tec;
        tecSelect.appendChild(opt);
      });
    }

    function toggleRegionais() {
      const checked = document.getElementById("toggle-regionais").checked;
      layerRegionaisVisivel = checked;
      if (checked) {
        map.addLayer(regionaisCeLayer);
      } else {
        map.removeLayer(regionaisCeLayer);
      }
    }

    function aplicarFiltroStatusRegional() {
      filtroStatusRegional = document.getElementById("filtro-status-regional").value;
      reaplicarEstilos();
      atualizarVisibilidadeLimparRegional();
    }

    function aplicarFiltroTecnicoRegional() {
      filtroTecnicoRegional = document.getElementById("filtro-tecnico-regional").value;
      reaplicarEstilos();
      atualizarVisibilidadeLimparRegional();
    }

    function limparFiltrosRegionais() {
      filtroStatusRegional = "";
      filtroTecnicoRegional = "";
      document.getElementById("filtro-status-regional").value = "";
      document.getElementById("filtro-tecnico-regional").value = "";
      reaplicarEstilos();
      atualizarVisibilidadeLimparRegional();
    }

    function atualizarVisibilidadeLimparRegional() {
      const limpar = document.getElementById("filtro-regionais-limpar");
      if (filtroStatusRegional || filtroTecnicoRegional) {
        limpar.classList.add("visivel");
      } else {
        limpar.classList.remove("visivel");
      }
    }

    // ════════════════════════════════════════════════════════════
    // BUSCA
    // ════════════════════════════════════════════════════════════
    const inputBusca = document.getElementById("busca");
    const resultBusca = document.getElementById("busca-resultados");

    inputBusca.addEventListener("input", () => {
      const q = inputBusca.value.trim().toLowerCase();
      if (!q) { fecharBusca(); return; }

      const resultados = [];

      // Busca municípios
      Object.entries(dadosPlanilha).forEach(([ibge, d]) => {
        const nome = d.municipio || ibge;
        if (nome.toLowerCase().includes(q) || ibge.includes(q)) {
          resultados.push({ type: "municipio", ibge, nome, label: nome });
        }
      });

      // Busca regionais
      Object.entries(dadosRegionais).forEach(([nome, d]) => {
        if (nome.toLowerCase().includes(q)) {
          resultados.push({ type: "regional", nome, label: `${nome} (Regional)` });
        }
      });

      if (resultados.length === 0) { fecharBusca(); return; }

      resultBusca.innerHTML = resultados.slice(0, 10).map(r =>
        `<div class="busca-item" data-type="${r.type}" data-key="${r.ibge || r.nome}">
          <span>${r.label}</span>
          ${r.ibge ? `<span class="ibge">${r.ibge}</span>` : ""}
        </div>`
      ).join("");

      resultBusca.style.display = "block";

      resultBusca.querySelectorAll(".busca-item").forEach(el => {
        el.onclick = () => {
          const type = el.dataset.type;
          const key = el.dataset.key;
          if (type === "municipio") {
            const layer = featureLayers[key];
            if (layer) {
              const { nome } = extrairPropriedades(layer.feature.properties);
              selecionarMunicipio(key, nome, layer);
              map.flyToBounds(layer.getBounds(), { padding: [80, 80], duration: 0.6 });
            }
          } else if (type === "regional") {
            const layer = regionaisCeFeatureLayers[key];
            if (layer) {
              selecionarRegionalCe(key, layer);
              map.flyToBounds(layer.getBounds(), { padding: [80, 80], duration: 0.5 });
            }
          }
          fecharBusca();
        };
      });
    });

    function fecharBusca() {
      resultBusca.style.display = "none";
      resultBusca.innerHTML = "";
    }

    // ════════════════════════════════════════════════════════════
    // STATUS BAR
    // ════════════════════════════════════════════════════════════
    async function atualizarSb() {
      try {
        const r = await fetch(`${API}/status`);
        if (!r.ok) throw new Error();
        const s = await r.json();
        document.getElementById("sb-conn").innerHTML = `<span class="dot-ok">●</span> ${s.total_municipios} mun. · ${s.total_regionais} reg.`;
        document.getElementById("sb-total").textContent = `Fonte: ${s.fonte}`;
        document.getElementById("sb-hora").textContent = `Atualizado: ${s.gerado_em}`;
      } catch {
        document.getElementById("sb-conn").innerHTML = `<span class="dot-err">●</span> Offline`;
      }
    }

    function setSb(ok, msg) {
      document.getElementById("sb-conn").innerHTML = `<span class="dot-${ok ? 'ok' : 'err'}">●</span> ${msg}`;
    }

    // ════════════════════════════════════════════════════════════
    // RELOAD
    // ════════════════════════════════════════════════════════════
    document.getElementById("btn-reload").addEventListener("click", async () => {
      const btn = document.getElementById("btn-reload");
      btn.classList.add("loading");
      btn.disabled = true;
      try {
        const r = await fetch(`${API}/reload`, { method: "POST" });
        if (!r.ok) throw new Error();
        await carregarDados();
      } catch (e) {
        console.error("Reload:", e);
        setSb(false, "Erro no reload");
      }
      btn.classList.remove("loading");
      btn.disabled = false;
    });

    // ════════════════════════════════════════════════════════════
    // INIT
    // ════════════════════════════════════════════════════════════
    (async () => {
      await carregarGeojsonMunicipios();
      await carregarRegionaisCe();
      await carregarDados();
    })();
  </script>
</body>
