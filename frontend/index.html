<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa Municipal — Ceará</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3249;
      --text: #e2e4ef;
      --muted: #8b8fa8;
      --accent: #7c6ff7;
      --radius: 10px;
      --panel-w: 280px;
      --header-h: 54px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── header ── */
    header {
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 14px;
      flex-shrink: 0;
      z-index: 1000;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
    }

    header h1 span {
      color: var(--muted);
      font-weight: 400;
    }

    /* ── busca ── */
    .search-wrap {
      position: relative;
      flex: 0 0 210px;
    }

    #busca {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      padding: 7px 12px 7px 32px;
      outline: none;
      transition: border-color .2s;
    }

    #busca:focus {
      border-color: var(--accent);
    }

    #busca::placeholder {
      color: var(--muted);
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 14px;
    }

    #busca-resultados {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      z-index: 9999;
      max-height: 220px;
      overflow-y: auto;
      display: none;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .5);
    }

    .busca-item {
      padding: 9px 12px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }

    .busca-item:last-child {
      border-bottom: none;
    }

    .busca-item:hover {
      background: var(--surface2);
    }

    .busca-item .ibge {
      color: var(--muted);
      font-size: 11px;
      font-family: monospace;
    }

    /* ── botão reload ── */
    #btn-reload {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 12px;
      padding: 6px 12px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
      white-space: nowrap;
    }

    #btn-reload:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    #btn-reload:disabled {
      opacity: .5;
      cursor: default;
    }

    #btn-reload.loading .ri {
      animation: spin .6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .ri {
      display: inline-block;
      font-size: 15px;
      line-height: 1;
    }

    /* ── botão ver levantamento ── */
    #btn-levantamento {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 12px;
      padding: 6px 12px;
      cursor: pointer;
      transition: border-color .2s, color .2s, background .2s, opacity .2s;
      white-space: nowrap;
    }
    #btn-levantamento:not(:disabled):hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    #btn-levantamento:disabled {
      opacity: .45;
      cursor: not-allowed;
    }
    #btn-levantamento.ativo {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── botao de tipo de mapa ── */
    #btn-maptype {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 12px;
      padding: 6px 12px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
      white-space: nowrap;
      min-width: 116px;
      justify-content: center;
    }
    #btn-maptype:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    #btn-maptype .ri {
      font-size: 14px;
    }

    /* ── range de data (so visivel no levantamento) ── */
    #data-range-wrap {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 0 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      height: 32px;
    }
    #data-range-wrap.show {
      display: flex;
    }
    #data-range-wrap .lbl {
      font-size: 11px;
      color: var(--muted);
      font-family: monospace;
      white-space: nowrap;
    }
    #data-range-wrap .cur {
      font-size: 11px;
      color: var(--accent);
      font-family: monospace;
      white-space: nowrap;
      min-width: 80px;
      text-align: center;
    }
    #data-range {
      -webkit-appearance: none;
      appearance: none;
      width: 220px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      flex-shrink: 0;
      flex-grow: 0;
    }
    #data-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: var(--accent);
      border: 2px solid var(--surface);
      border-radius: 50%;
      cursor: pointer;
    }
    #data-range::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: var(--accent);
      border: 2px solid var(--surface);
      border-radius: 50%;
      cursor: pointer;
    }

    /* ── layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── mapa ── */
    #map {
      flex: 1;
      background: #090c14;
      position: relative;
    }

    /* ── FAB sair do levantamento ── */
    #btn-exit-levantamento {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #E24B4A;
      color: #fff;
      border: none;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,.45);
      z-index: 600;
      display: none;
      align-items: center;
      justify-content: center;
      transition: background .15s, transform .15s;
    }
    #btn-exit-levantamento:hover {
      background: #c83a39;
      transform: scale(1.05);
    }
    #btn-exit-levantamento.show {
      display: flex;
    }

    /* ── FAB toggle transformadores (abaixo do X) ── */
    #btn-transformadores {
      position: absolute;
      top: 66px;
      right: 14px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--surface);
      color: #fff;
      border: 1px solid var(--border);
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,.45);
      z-index: 600;
      display: none;
      align-items: center;
      justify-content: center;
      transition: background .15s, color .15s, transform .15s, border-color .15s;
    }
    #btn-transformadores:hover {
      border-color: var(--accent);
      transform: scale(1.05);
    }
    #btn-transformadores.show {
      display: flex;
    }
    #btn-transformadores.ativo {
      background: var(--accent);
      border-color: var(--accent);
    }
    #btn-transformadores.loading {
      pointer-events: none;
      opacity: .6;
    }

    /* ── FAB toggle areas inacessiveis (abaixo do trafos) ── */
    #btn-areas {
      position: absolute;
      top: 118px;
      right: 14px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--surface);
      color: #fff;
      border: 1px solid var(--border);
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,.45);
      z-index: 600;
      display: none;
      align-items: center;
      justify-content: center;
      transition: background .15s, color .15s, transform .15s, border-color .15s;
    }
    #btn-areas:hover {
      border-color: #EF9F27;
      transform: scale(1.05);
    }
    #btn-areas.show {
      display: flex;
    }
    #btn-areas.ativo {
      background: #EF9F27;
      border-color: #EF9F27;
    }
    #btn-areas.loading {
      pointer-events: none;
      opacity: .6;
    }

    /* ── FAB download/exportar (abaixo do areas) ── */
    #btn-download {
      position: absolute;
      top: 170px;
      right: 14px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--surface);
      color: #fff;
      border: 1px solid var(--border);
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,.45);
      z-index: 600;
      display: none;
      align-items: center;
      justify-content: center;
      transition: background .15s, color .15s, transform .15s, border-color .15s;
    }
    #btn-download:hover {
      border-color: var(--accent);
      transform: scale(1.05);
    }
    #btn-download.show {
      display: flex;
    }
    #btn-download.loading {
      pointer-events: none;
      opacity: .6;
    }

    /* ── overlay de loading centralizado no mapa ── */
    .map-loading {
      position: absolute;
      inset: 0;
      background: rgba(10,13,22,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      z-index: 700;
      pointer-events: all;
    }
    .map-loading.show {
      display: flex;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--surface2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    .loading-text {
      color: var(--text);
      font-size: 13px;
      background: var(--surface);
      padding: 9px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      box-shadow: 0 6px 18px rgba(0,0,0,.45);
      max-width: 80%;
      text-align: center;
    }

    /* ── modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    .modal-overlay.show {
      display: flex;
    }
    .modal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px 26px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 10px 30px rgba(0,0,0,.5);
    }
    .modal-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
    }
    .modal-msg {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
    .modal-msg strong {
      color: var(--text);
    }
    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }
    .modal-buttons button {
      border-radius: var(--radius);
      padding: 7px 16px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: background .15s, border-color .15s, color .15s;
    }
    .btn-cancel {
      background: var(--surface2);
      color: var(--text);
    }
    .btn-cancel:hover {
      border-color: var(--muted);
    }
    .btn-confirm {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-confirm:hover {
      filter: brightness(1.12);
    }

    /* ── pontos do levantamento (apenas pontos sobrepostos usam DivIcon;
       os singletons usam L.circleMarker no canvas para performance) ── */
    .lev-marker {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid #0a0d16;
      box-sizing: border-box;
      position: relative;
    }
    .lev-marker.stack {
      width: 12px;
      height: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      text-shadow: 0 0 2px rgba(0,0,0,.85);
    }
    .lev-marker.stack::before {
      content: '*';
      transform: translateY(2.5px);
    }

    /* ── card de ponto no painel lateral ── */
    .point-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      gap: 10px;
    }
    .point-label {
      color: var(--muted);
      flex-shrink: 0;
    }
    .point-value {
      color: var(--text);
      text-align: right;
      word-break: break-word;
    }
    .point-value a {
      color: var(--accent);
      text-decoration: none;
    }
    .point-value a:hover {
      text-decoration: underline;
    }
    .point-obs-toggle {
      color: var(--accent);
      cursor: pointer;
      font-size: 11px;
      margin-left: 6px;
      user-select: none;
    }
    .point-obs-toggle:hover {
      text-decoration: underline;
    }
    .point-titulo {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    body.maptype-dark .leaflet-tile-pane {
      filter: brightness(0.8) saturate(0.5);
    }

    /* ── tooltip leaflet ── */
    .leaflet-tooltip {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 7px !important;
      color: var(--text) !important;
      font-size: 12px !important;
      padding: 6px 10px !important;
      box-shadow: 0 4px 14px rgba(0, 0, 0, .5) !important;
      pointer-events: none !important;
    }

    .leaflet-tooltip::before {
      display: none !important;
    }

    .tt-nome {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 2px;
    }

    .tt-ibge {
      color: var(--muted);
      font-size: 11px;
      font-family: monospace;
    }

    .tt-status {
      margin-top: 4px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .tt-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── painel lateral ── */
    #painel {
      width: var(--panel-w);
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .painel-titulo {
      padding: 14px 16px 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .filtro-limpar {
      font-size: 11px;
      color: var(--accent);
      cursor: pointer;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
      display: none;
    }

    .filtro-limpar.visivel {
      display: block;
    }

    /* ── legenda / filtro ── */
    #legenda-lista {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }

    .legenda-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 6px 8px;
      border-radius: 7px;
      margin-bottom: 3px;
      cursor: pointer;
      transition: background .12s, opacity .15s;
      user-select: none;
      border: 1px solid transparent;
    }

    .legenda-item:hover {
      background: var(--surface2);
    }

    .legenda-item.ativo {
      background: var(--surface2);
      border-color: var(--border);
    }

    .legenda-item.inativo {
      opacity: .35;
    }

    .legenda-cor {
      width: 13px;
      height: 13px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .legenda-label {
      font-size: 13px;
      flex: 1;
    }

    .legenda-count {
      font-size: 11px;
      color: var(--muted);
      background: var(--bg);
      padding: 1px 6px;
      border-radius: 10px;
      font-family: monospace;
    }

    /* ── card município ── */
    #card-municipio {
      padding: 16px;
      flex: 1;
      overflow-y: auto;
    }

    .placeholder {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      margin-top: 32px;
      line-height: 1.7;
    }

    .placeholder em {
      font-style: normal;
      font-size: 22px;
      display: block;
      margin-bottom: 8px;
    }

    .mun-nome {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .mun-ibge {
      font-size: 11px;
      color: var(--muted);
      font-family: monospace;
      margin-bottom: 14px;
    }

    .mun-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 20px;
    }

    .mun-badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .sem-dado {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
    }

    /* ── status bar ── */
    #statusbar {
      height: 28px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 18px;
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .dot-ok {
      color: #1D9E75;
    }

    .dot-err {
      color: #E24B4A;
    }
  </style>
</head>

<body class="maptype-dark">

  <header>
    <h1>Mapa Municipal <span>/ Ceará</span></h1>

    <div id="data-range-wrap" title="Mostra levantamentos ate a data selecionada">
      <span class="lbl" id="data-range-min">—</span>
      <input type="range" id="data-range" min="0" max="100" value="100" step="1" />
      <span class="lbl" id="data-range-max">—</span>
      <span class="cur" id="data-range-cur">—</span>
    </div>

    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="busca" type="text" placeholder="Buscar município..." autocomplete="off">
      <div id="busca-resultados"></div>
    </div>

    <button id="btn-maptype" title="Trocar tipo de mapa">
      <span class="ri">◐</span>
      <span id="btn-maptype-label">Escuro</span>
    </button>

    <button id="btn-reload">
      <span class="ri">↻</span>
      Recarregar dados
    </button>

    <button id="btn-levantamento" disabled title="Selecione um município para habilitar">
      <span class="ri">⌖</span>
      Ver Levantamento
    </button>
  </header>

  <div class="main">
    <div id="map">
      <button id="btn-exit-levantamento" title="Sair do levantamento">✕</button>
      <button id="btn-transformadores" title="Mostrar/ocultar transformadores">★</button>
      <button id="btn-areas" title="Mostrar/ocultar áreas inacessíveis">⚠</button>
      <button id="btn-download" title="Exportar dados">⭳</button>
      <div id="map-loading" class="map-loading">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="map-loading-text">Carregando…</div>
      </div>
    </div>

    <div id="painel">
      <div class="painel-titulo">
        Status
        <span class="filtro-limpar" id="filtro-status-limpar" onclick="limparFiltro('status')">Limpar</span>
      </div>
      <div id="legenda-lista"></div>

      <div class="painel-titulo" style="margin-top:0">
        Tipo
        <span class="filtro-limpar" id="filtro-tipo-limpar" onclick="limparFiltro('tipo')">Limpar</span>
      </div>
      <div id="tipo-lista"></div>

      <div id="card-municipio">
        <div class="placeholder">
          <em>🗺️</em>
          Clique em um município<br>para ver detalhes
        </div>
      </div>
    </div>
  </div>

  <div id="statusbar">
    <span id="sb-conn"><span class="dot-err">●</span> Conectando...</span>
    <span id="sb-total"></span>
    <span id="sb-hora"></span>
  </div>

  <!-- Modal de confirmação Ver Levantamento (precisa estar antes do <script> que registra listeners) -->
  <div class="modal-overlay" id="modal-confirma">
    <div class="modal-card">
      <div class="modal-title">Confirmar visualização</div>
      <div class="modal-msg">
        Tem certeza que quer ver o levantamento de
        <strong id="modal-municipio"></strong>?
      </div>
      <div class="modal-buttons">
        <button class="btn-cancel" id="modal-cancel">Cancelar</button>
        <button class="btn-confirm" id="modal-confirm">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ════════════════════════════════════════════════════════════
    // CONFIG
    // ════════════════════════════════════════════════════════════
    const API = "";

    // ════════════════════════════════════════════════════════════
    // ESTADO
    // ════════════════════════════════════════════════════════════
    let dadosPlanilha = {};      // { "2304400": { status, cor } }
    let geojsonData = null;
    let geojsonLayer = null;
    let featureLayers = {};      // { ibge: leaflet_layer }
    let selectedLayer = null;
    let selectedIbge = null;
    let regionaisLayer = null;
    let regionaisData = null;
    let regionaisLayers = {};  // { "FORTALEZA - REGIONAL 1": layer }
    let filtros = { status: null, tipo: null };    // status selecionado na legenda, ou null

    // Estado do modo Levantamento
    let levantamentoMode       = false;
    let levantamentoLayer      = null;   // L.layerGroup com markers
    let levantamentoPontos     = [];     // pontos crus retornados pelo backend
    let stackGroups            = null;   // Map<"lat,lng", [pontos]>
    let currentLevantamentoKey = null;   // IBGE (string) ou nome da regional
    let currentMunicipioNome   = null;
    let spiderfied             = null;   // { markers: [], lines: [] }
    let savedCardHtml          = null;   // placeholder do card para restaurar ao sair
    let currentOutlineLayer    = null;   // outline do municipio focado durante o levantamento

    // Transformadores (toggle independente dentro do modo levantamento)
    let transformadoresAtivos  = false;
    let transformadoresLayer   = null;
    let transformadoresPontos  = [];

    // Areas inacessiveis (toggle independente dentro do modo levantamento)
    let areasAtivas      = false;
    let areasLayer       = null;
    let areasFeatures    = [];

    // Filtro por data (DATA_REGISTRO) no levantamento
    let dataMin = null;   // Date min
    let dataMax = null;   // Date max
    let dataAte = null;   // Date atual (limite superior)
    let levantamentoMarkers = new Map();  // chaveCoord -> { layer, group }

    // Constantes de cor dos pontos (espelham backend/config.py)
    const COR_MEDICAO_SIM = "#7CFC00";
    const COR_MEDICAO_NAO = "#1E3A8A";
    const COR_SEM_DADO    = "#B4B2A9";
    const COR_TRAFO       = "#FFFFFF";   // branco

    // Ordem das colunas exibidas no painel (espelha COLUNAS_LEVANTAMENTO)
    const COLUNAS_LEVANTAMENTO = [
      "ID_PONTO", "TRANSFORMADOR", "IMPRODUTIVO", "MEDICAO", "MEDIDOR_NC",
      "TIPOLAMPADA", "POTENCIA", "ESTADO_TECNICO", "TIPO_REDE", "OBSERVACAO",
      "DATA_REGISTRO", "Nome_Cadastrador", "LINK_RELATORIO", "PONTOTRAFO", "PROJETO",
    ];

    // ════════════════════════════════════════════════════════════
    // MAPA
    // ════════════════════════════════════════════════════════════
    const map = L.map("map", {
      zoomControl: true,
      attributionControl: false,
      maxZoom: 21,
    });

    // ──────────────────────────────────────────────
    // Tile layers gerenciaveis (troca dinamica preservando estado)
    // ──────────────────────────────────────────────
    const MAP_TYPES = [
      {
        id: "dark",
        label: "Escuro",
        urls: ["https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png"],
        opts: [{ subdomains: "abcd", maxZoom: 21, maxNativeZoom: 19 }],
      },
      {
        id: "light",
        label: "Claro",
        urls: ["https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png"],
        opts: [{ subdomains: "abcd", maxZoom: 21, maxNativeZoom: 19 }],
      },
      {
        id: "satellite",
        label: "Satélite",
        urls: ["https://mt{s}.google.com/vt/lyrs=y&hl=pt&x={x}&y={y}&z={z}"],
        opts: [{ subdomains: "0123", maxZoom: 21, maxNativeZoom: 21 }],
      },
    ];
    let mapTypeIdx = 0;
    let tileLayers = [];

    function aplicarMapType(idx) {
      tileLayers.forEach(l => map.removeLayer(l));
      const t = MAP_TYPES[idx];
      tileLayers = t.urls.map((u, i) => L.tileLayer(u, t.opts[i]));
      tileLayers.forEach(l => l.addTo(map));
      tileLayers.forEach(l => l.bringToBack && l.bringToBack());
      document.body.classList.remove("maptype-dark", "maptype-light", "maptype-satellite");
      document.body.classList.add(`maptype-${t.id}`);
      const lbl = document.getElementById("btn-maptype-label");
      if (lbl) lbl.textContent = t.label;
      mapTypeIdx = idx;
    }

    aplicarMapType(0);

    // Renderer canvas compartilhado para os pontos do levantamento (alto throughput)
    const canvasRenderer = L.canvas({ padding: 0.5 });

    const CE_BOUNDS = L.latLngBounds(L.latLng(-7.86, -41.43), L.latLng(-2.78, -37.25));
    map.fitBounds(CE_BOUNDS);
    map.setMaxBounds(CE_BOUNDS.pad(0.35));

    // Fecha busca ao mover o mapa
    map.on("click", () => fecharBusca());

    // ════════════════════════════════════════════════════════════
    // ESTILO
    // ════════════════════════════════════════════════════════════
    function getEstilo(ibge, opcoes = {}) {
      const dado = dadosPlanilha[ibge];
      const cor = dado ? dado.cor : "#1e2236";
      const status = dado ? dado.status : "";
      const tipo = dado ? dado.tipo : "";

      const apagado = (
        (filtros.status !== null && status !== filtros.status) ||
        (filtros.tipo !== null && tipo !== filtros.tipo)
      );

      return {
        fillColor: cor,
        fillOpacity: apagado ? 0.08 : (opcoes.hover ? 0.92 : opcoes.selected ? 1 : 0.72),
        color: opcoes.selected ? "#7c6ff7" : "#0a0d16",
        weight: opcoes.selected ? 2.2 : opcoes.hover ? 1.4 : 0.6,
        opacity: apagado ? 0.3 : 1,
      };
    }

    function getEstiloRegional(chave, opcoes = {}) {
      const dado = chave ? dadosPorMunicipio[chave] : null;
      const cor = dado ? dado.cor : "#1e2236";

      const status = dado ? dado.status : "";
      const tipo = dado ? dado.tipo : "";
      const apagado = (
        (filtros.status !== null && status !== filtros.status) ||
        (filtros.tipo !== null && tipo !== filtros.tipo)
      );

      return {
        fillColor: cor,
        fillOpacity: apagado ? 0.08 : (opcoes.hover ? 0.92 : opcoes.selected ? 1 : 0.72),
        color: opcoes.selected ? "#7c6ff7" : "#0a0d16",
        weight: opcoes.selected ? 2.2 : opcoes.hover ? 1.4 : 0.6,
        opacity: apagado ? 0.3 : 1,
      };
    }

    function aplicarEstiloSelecionadoRegional(layer, chave) {
      layer.setStyle(getEstiloRegional(chave, { selected: true }));
    }

    function selecionarRegional(chave, layer) {
      if (selectedLayer && selectedLayer !== layer) {
        // Reset anterior — pode ser município ou regional
        if (selectedLayer.feature) {
          const props = selectedLayer.feature.properties;
          if (props.regiao_adm !== undefined) {
            regionaisLayer.resetStyle(selectedLayer);
            const chaveAnt = chaveRegional(props);
            selectedLayer.setStyle(getEstiloRegional(chaveAnt));
          } else {
            const { ibge } = extrairPropriedades(props);
            aplicarEstiloNormal(selectedLayer, ibge);
          }
        }
      }

      selectedLayer = layer;
      selectedIbge = null;
      aplicarEstiloSelecionadoRegional(layer, chave);

      map.flyToBounds(layer.getBounds(), { padding: [80, 80], duration: 0.5, maxZoom: 12 });

      const dado = dadosPorMunicipio[chave];
      const status = dado ? dado.status : "";
      const cor = dado ? dado.cor : "";
      const tipo = dado ? dado.tipo : "";

      let html = `
    <div class="mun-nome">${chave}</div>
    <div class="mun-ibge" style="font-family:inherit">Regional de Fortaleza</div>
  `;

      if (status) {
        html += `
      <div class="mun-badge" style="background:${cor}22;color:${cor};border:1px solid ${cor}55;margin-top:14px">
        <span class="dot" style="background:${cor}"></span>${status}
      </div>
    `;
      } else {
        html += `<div class="sem-dado" style="margin-top:14px">Sem dado na planilha</div>`;
      }

      if (tipo) {
        html += `<div style="margin-top:8px;font-size:12px;color:var(--muted)">Tipo: <span style="color:var(--text)">${tipo}</span></div>`;
      }

      document.getElementById("card-municipio").innerHTML = html;

      currentLevantamentoKey = chave;
      currentMunicipioNome   = chave;
      document.getElementById("btn-levantamento").disabled = false;
    }

    function aplicarEstiloNormal(layer, ibge) {
      layer.setStyle(getEstilo(ibge));
    }

    function aplicarEstiloHover(layer, ibge) {
      if (layer === selectedLayer) return;
      layer.setStyle(getEstilo(ibge, { hover: true }));
    }

    function aplicarEstiloSelecionado(layer, ibge) {
      layer.setStyle(getEstilo(ibge, { selected: true }));
    }

    function buscarDadoRegional(chave) {
      return dadosPorMunicipio[chave] || null;
    }

    // ════════════════════════════════════════════════════════════
    // GEOJSON
    // ════════════════════════════════════════════════════════════

    function chaveRegional(props) {
      // regiao_adm vem como "SER 1", "SER 11" etc.
      const ser = String(props.regiao_adm || "").trim();
      const num = ser.replace(/^SER\s*/i, "").trim();
      if (!num) return null;
      return `FORTALEZA - REGIONAL ${num}`;
    }

    function extrairPropriedades(props) {
      const ibge = String(
        props.codigo_ibg ||   // ← campo real do seu GeoJSON (QGIS truncou)
        props.CD_MUN ||
        props.codigo_ibge ||
        props.geocodigo ||
        props.CD_GEOCMU ||
        props.GEOCODIGO || ""
      ).trim().replace(/\.0$/, "").padStart(7, "0");

      const nome = props.Municipio ||   // ← campo real do seu GeoJSON
        props.NM_MUN ||
        props.nome ||
        props.NOME ||
        props.NM_MUNICIPIO || ibge;

      return { ibge, nome };
    }

    async function carregarGeojson() {
      try {
        const r = await fetch("/municipios_ce.geojson");
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        geojsonData = await r.json();

        const IBGE_FORTALEZA = "2304400";
        const featuresFiltered = {
          ...geojsonData,
          features: geojsonData.features.filter(f => {
            const { ibge } = extrairPropriedades(f.properties);
            return ibge !== IBGE_FORTALEZA;
          }),
        };
        geojsonLayer = L.geoJSON(featuresFiltered, {
          style: f => {
            const { ibge } = extrairPropriedades(f.properties);
            return getEstilo(ibge);
          },
          onEachFeature: (feature, layer) => {
            const { ibge, nome } = extrairPropriedades(feature.properties);
            featureLayers[ibge] = layer;

            // ── hover ──────────────────────────────────────────
            layer.on("mouseover", function (e) {
              aplicarEstiloHover(this, ibge);

              const dado = dadosPlanilha[ibge];
              const status = dado ? dado.status : "";
              const cor = dado ? dado.cor : "";
              const tipo = dado ? dado.tipo : "";

              const statusHtml = status
                ? `<div class="tt-status">
                <span class="tt-dot" style="background:${cor}"></span>
                ${status}${tipo ? ` · ${tipo}` : ""}
              </div>`
                : `<div class="tt-status" style="color:#8b8fa8">Sem dado</div>`;

              this.bindTooltip(
                `<div class="tt-nome">${nome}</div>
             <div class="tt-ibge">${ibge}</div>
             ${statusHtml}`,
                { sticky: true, direction: "top", offset: [0, -6], opacity: 1 }
              ).openTooltip(e.latlng);
            });

            // ── mouseout ────────────────────────────────────────
            layer.on("mouseout", function () {
              // Só reseta se não for o selecionado
              if (this !== selectedLayer) {
                aplicarEstiloNormal(this, ibge);
              }
              this.closeTooltip();
            });

            // ── click ───────────────────────────────────────────
            layer.on("click", function () {
              selecionarMunicipio(ibge, nome, this);
            });
          },
        }).addTo(map);

        map.fitBounds(geojsonLayer.getBounds());

      } catch (e) {
        console.error("GeoJSON:", e);
        setSb(false, "GeoJSON não encontrado em frontend/municipios_ce.geojson");
      }
    }

    async function carregarRegionais() {
      try {
        const r = await fetch("/limites_regionais_fortaleza.geojson");
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        regionaisData = await r.json();

        regionaisLayer = L.geoJSON(regionaisData, {
          style: f => {
            const chave = chaveRegional(f.properties);
            return getEstiloRegional(chave);
          },
          onEachFeature: (feature, layer) => {
            const props = feature.properties;
            const chave = chaveRegional(props);
            if (!chave) return;
            regionaisLayers[chave] = layer;

            layer.on("mouseover", function (e) {
              if (this !== selectedLayer) this.setStyle({ fillOpacity: 0.92, weight: 1.8, color: "#ffffff" });
              const dado = buscarDadoRegional(chave);
              const status = dado ? dado.status : "";
              const cor = dado ? dado.cor : "";
              const statusHtml = status
                ? `<div class="tt-status"><span class="tt-dot" style="background:${cor}"></span>${status}${dado.tipo ? ` · ${dado.tipo}` : ""}</div>`
                : `<div class="tt-status" style="color:#8b8fa8">Sem dado</div>`;
              this.bindTooltip(
                `<div class="tt-nome">${chave}</div>${statusHtml}`,
                { sticky: true, direction: "top", offset: [0, -6], opacity: 1 }
              ).openTooltip(e.latlng);
            });

            layer.on("mouseout", function () {
              if (this !== selectedLayer) regionaisLayer.resetStyle(this);
              this.closeTooltip();
            });

            layer.on("click", function () {
              selecionarRegional(chave, this);
            });
          },
        }).addTo(map);

      } catch (e) {
        console.error("Regionais GeoJSON:", e);
      }
    }

    // ════════════════════════════════════════════════════════════
    // DADOS DA API
    // ════════════════════════════════════════════════════════════
    // Índice secundário: { "FORTALEZA - REGIONAL 1": { status, cor, tipo, municipio } }
    let dadosPorMunicipio = {};

    async function carregarDados() {
      try {
        const r = await fetch(`${API}/municipios`);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        dadosPlanilha = await r.json();

        // Monta índice por nome de município (para regionais)
        dadosPorMunicipio = {};
        Object.values(dadosPlanilha).forEach(d => {
          if (d.municipio) dadosPorMunicipio[d.municipio] = d;
        });

        // Atualiza estilos
        if (geojsonLayer) {
          geojsonLayer.eachLayer(layer => {
            if (!layer.feature) return;
            const { ibge } = extrairPropriedades(layer.feature.properties);
            layer === selectedLayer
              ? aplicarEstiloSelecionado(layer, ibge)
              : aplicarEstiloNormal(layer, ibge);
          });
        }

        if (regionaisLayer) {
          regionaisLayer.eachLayer(layer => {
            if (!layer.feature) return;
            const chave = chaveRegional(layer.feature.properties);
            if (!chave) return;
            layer === selectedLayer
              ? aplicarEstiloSelecionadoRegional(layer, chave)
              : regionaisLayer.resetStyle(layer);
            // Reaplicar estilo correto
            layer.setStyle(getEstiloRegional(chave));
          });
        }

        renderizarLegenda();
        await atualizarSb();
        return true;
      } catch (e) {
        console.error("API:", e);
        setSb(false, "Servidor indisponível — execute server.py");
        return false;
      }
    }
    // ════════════════════════════════════════════════════════════
    // SELEÇÃO DE MUNICÍPIO
    // ════════════════════════════════════════════════════════════
    function selecionarMunicipio(ibge, nome, layer) {
      // Remove seleção anterior
      if (selectedLayer && selectedLayer !== layer) {
        const ibgeAnterior = selectedIbge;
        aplicarEstiloNormal(selectedLayer, ibgeAnterior);
      }

      selectedLayer = layer;
      selectedIbge = ibge;
      aplicarEstiloSelecionado(layer, ibge);

      map.flyToBounds(layer.getBounds(), { padding: [80, 80], duration: 0.6, maxZoom: 10 });

      const dado = dadosPlanilha[ibge];
      const status = dado ? dado.status : "";
      const cor = dado ? dado.cor : "";
      const tipo = dado ? dado.tipo : "";

      let html = `
    <div class="mun-nome">${nome}</div>
    <div class="mun-ibge">IBGE: ${ibge}</div>
  `;

      if (status) {
        html += `
      <div class="mun-badge" style="background:${cor}22; color:${cor}; border:1px solid ${cor}55">
        <span class="dot" style="background:${cor}"></span>
        ${status}
      </div>
    `;
      }

      else if (tipo) {
        html += `<div style="margin-top:8px;font-size:12px;color:var(--muted)">Tipo: <span style="color:var(--text)">${tipo}</span></div>`;
      } else {
        html += `<div class="sem-dado">Sem dado na planilha</div>`;
      }

      document.getElementById("card-municipio").innerHTML = html;

      currentLevantamentoKey = String(ibge);
      currentMunicipioNome   = nome;
      document.getElementById("btn-levantamento").disabled = false;
    }

    // ════════════════════════════════════════════════════════════
    // LEGENDA / FILTRO
    // ════════════════════════════════════════════════════════════
    function renderizarLegenda() {
      const contagem = {};
      Object.values(dadosPlanilha).forEach(d => {
        if (d.status) contagem[d.status] = (contagem[d.status] || 0) + 1;
      });

      let semDado = 0;
      if (geojsonData) {
        geojsonData.features.forEach(f => {
          const { ibge } = extrairPropriedades(f.properties);
          if (!dadosPlanilha[ibge]) semDado++;
        });
      }

      const container = document.getElementById("legenda-lista");
      container.innerHTML = "";
      Object.entries(contagem).forEach(([status, count]) => {
        const cor = Object.values(dadosPlanilha).find(d => d.status === status)?.cor || "#888";
        container.appendChild(criarItemFiltro("status", status, cor, count));
      });
      if (semDado > 0) {
        container.appendChild(criarItemFiltro("status", "(sem dado)", "#1e2236", semDado, true));
      }

      renderizarTipos();
    }

    function renderizarTipos() {
      const contagem = {};
      Object.values(dadosPlanilha).forEach(d => {
        if (d.tipo) contagem[d.tipo] = (contagem[d.tipo] || 0) + 1;
      });

      const container = document.getElementById("tipo-lista");
      container.innerHTML = "";

      if (Object.keys(contagem).length === 0) {
        container.innerHTML = `<div style="padding:10px 16px;font-size:12px;color:var(--muted)">Nenhum tipo encontrado</div>`;
        return;
      }

      Object.entries(contagem).forEach(([tipo, count]) => {
        container.appendChild(criarItemFiltro("tipo", tipo, "var(--muted)", count));
      });
    }

    function criarItemFiltro(qual, valor, cor, count, semDado = false) {
      const div = document.createElement("div");
      div.className = "legenda-item";
      div.dataset.qual = qual;
      div.dataset.valor = valor;

      // Para tipo, usa um quadrado neutro com borda colorida
      const corEl = qual === "tipo"
        ? `<div class="legenda-cor" style="background:var(--surface2);border:2px solid var(--accent)"></div>`
        : `<div class="legenda-cor" style="background:${cor}"></div>`;

      div.innerHTML = `
    ${corEl}
    <span class="legenda-label">${valor}</span>
    <span class="legenda-count">${count}</span>
  `;

      if (!semDado) {
        div.addEventListener("click", () => toggleFiltro(qual, valor));
      }
      return div;
    }

    function toggleFiltro(qual, valor) {
      if (filtros[qual] === valor) {
        filtros[qual] = null;
        document.getElementById(`filtro-${qual}-limpar`).classList.remove("visivel");
      } else {
        filtros[qual] = valor;
        document.getElementById(`filtro-${qual}-limpar`).classList.add("visivel");
      }

      // Atualiza visual dos itens da seção clicada
      document.querySelectorAll(`.legenda-item[data-qual="${qual}"]`).forEach(el => {
        const ativo = filtros[qual] === null || el.dataset.valor === filtros[qual];
        el.classList.toggle("ativo", ativo && filtros[qual] !== null);
        el.classList.toggle("inativo", !ativo);
      });

      reaplicarEstilos();
    }

    function limparFiltro(qual) {
      filtros[qual] = null;
      document.getElementById(`filtro-${qual}-limpar`).classList.remove("visivel");
      document.querySelectorAll(`.legenda-item[data-qual="${qual}"]`).forEach(el => {
        el.classList.remove("ativo", "inativo");
      });
      reaplicarEstilos();
    }

    function reaplicarEstilos() {
      if (geojsonLayer) {
        geojsonLayer.eachLayer(layer => {
          if (!layer.feature) return;
          const { ibge } = extrairPropriedades(layer.feature.properties);
          layer === selectedLayer
            ? aplicarEstiloSelecionado(layer, ibge)
            : aplicarEstiloNormal(layer, ibge);
        });
      }
      if (regionaisLayer) {
        regionaisLayer.eachLayer(layer => {
          if (!layer.feature) return;
          const chave = chaveRegional(layer.feature.properties);
          layer === selectedLayer
            ? aplicarEstiloSelecionadoRegional(layer, chave)
            : layer.setStyle(getEstiloRegional(chave));
        });
      }
    }
    // ════════════════════════════════════════════════════════════
    // BUSCA
    // ════════════════════════════════════════════════════════════
    const inputBusca = document.getElementById("busca");
    const listaBusca = document.getElementById("busca-resultados");

    function fecharBusca() {
      listaBusca.style.display = "none";
      inputBusca.blur();
    }

    function normalizar(s) {
      return s.toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    inputBusca.addEventListener("input", function () {
      const q = normalizar(this.value.trim());
      listaBusca.style.display = "none";

      if (q.length < 2 || !geojsonData) return;

      const resultados = [];
      geojsonData.features.forEach(f => {
        const { ibge, nome } = extrairPropriedades(f.properties);
        if (normalizar(nome).includes(q) || ibge.includes(q)) {
          resultados.push({ ibge, nome });
        }
      });

      // Regionais de Fortaleza na busca
      if (regionaisData) {
        regionaisData.features.forEach(f => {
          const chave = chaveRegional(f.properties);
          if (chave && normalizar(chave).includes(q)) {
            resultados.push({ ibge: null, nome: chave, isRegional: true });
          }
        });

        <div class="busca-item" data-ibge="${ibge}" data-nome="${nome}">
          <span>${nome}</span>
          <span class="ibge">${ibge}</span>
        </div>
      `).join("");

      listaBusca.innerHTML = top.map(({ ibge, nome, isRegional }) => `
        <div class="busca-item" data-ibge="${ibge || ''}" data-nome="${nome}" data-regional="${isRegional || false}">
          <span>${nome}</span>

          inputBusca.value = nome;

        el.addEventListener("click", () => {

          }
          inputBusca.value = nome;
          fecharBusca();
        });
      });

      listaBusca.style.display = "block";

    function bloquearMapa(layer) {

    function corDoPonto(p) {
      const m = String(p.MEDICAO || "").trim().toUpperCase();
      return m === "SIM" ? COR_MEDICAO_SIM : COR_MEDICAO_NAO;
    }

    function chaveCoord(lat, lng) {
      return lat.toFixed(6) + "," + lng.toFixed(6);
    }

    const POINT_RADIUS  = 4;   // raio dos pontos singletons (canvas)
    const STACK_ICONSIZE = 12; // diâmetro do ícone de stack (DivIcon)

    function makeSingletonMarker(latlng, p) {
      const cor = corDoPonto(p);
      return L.circleMarker(latlng, {
        radius:      POINT_RADIUS,
        fillColor:   cor,
        fillOpacity: 1,
        color:       "#0a0d16",
        weight:      1,
        renderer:    canvasRenderer,
      });
    }

    function makeStackMarker(latlng, p) {
      const cor = corDoPonto(p);
      const icon = L.divIcon({
        className: "",
        html: `<div class="lev-marker stack" style="background:${cor}"></div>`,
        iconSize:   [STACK_ICONSIZE, STACK_ICONSIZE],
        iconAnchor: [STACK_ICONSIZE / 2, STACK_ICONSIZE / 2],
      });
      return L.marker(latlng, { icon });
    }

    function desenharPontos(pontos) {
      levantamentoPontos = pontos;
      levantamentoLayer = L.layerGroup().addTo(map);
      stackGroups = new Map();
      levantamentoMarkers = new Map();

      // Agrupa por coordenada exata
      for (const p of pontos) {
        const k = chaveCoord(p.lat, p.lng);
        if (!stackGroups.has(k)) stackGroups.set(k, []);
        stackGroups.get(k).push(p);
      }

      // Renderiza um marker por grupo (representante)
      for (const [k, grupo] of stackGroups) {
        const rep = grupo[0];
        const ll  = L.latLng(rep.lat, rep.lng);
        const marker = grupo.length > 1
          ? makeStackMarker(ll, rep)
          : makeSingletonMarker(ll, rep);
        marker.bindTooltip(rep.ID_PONTO || "", { direction: "top", offset: [0, -6] });
        if (grupo.length > 1) {
          marker.on("click", (e) => {
            L.DomEvent.stopPropagation(e);
            const visiveis = grupo.filter(pontoDentroDoFiltroData);
            if (visiveis.length === 1) {
              mostrarPontoNoPainel(visiveis[0]);
            } else if (visiveis.length > 1) {
              spiderfy(ll, visiveis);
            }
          });
        } else {
          marker.on("click", (e) => {
            L.DomEvent.stopPropagation(e);
            if (pontoDentroDoFiltroData(rep)) mostrarPontoNoPainel(rep);
          });
        }
        marker.addTo(levantamentoLayer);
        levantamentoMarkers.set(k, { layer: marker, group: grupo });
      }
    }

    function spiderfy(centerLatLng, pontos) {
      unspiderfy();
      const n = pontos.length;
      const px = map.latLngToLayerPoint(centerLatLng);
      const radius = 30 + n * 3;
      const markers = [];
      const lines = [];
      for (let i = 0; i < n; i++) {
        const a = (2 * Math.PI * i) / n - Math.PI / 2;
        const off = L.point(Math.cos(a) * radius, Math.sin(a) * radius);
        const ll = map.layerPointToLatLng(px.add(off));
        const p = pontos[i];
        const m = makeSingletonMarker(ll, p);
        m.bindTooltip(p.ID_PONTO || "", { direction: "top", offset: [0, -6] });
        m.on("click", (e) => {
          L.DomEvent.stopPropagation(e);
          mostrarPontoNoPainel(p);
        });
        m.addTo(levantamentoLayer);
        const ln = L.polyline([centerLatLng, ll], {
          color: "#7c6ff7",
          weight: 1,
          opacity: 0.55,
          interactive: false,
        }).addTo(levantamentoLayer);
        markers.push(m);
        lines.push(ln);
      }
      spiderfied = { markers, lines };
    }

    function unspiderfy() {
      if (!spiderfied) return;
      spiderfied.markers.forEach(m => levantamentoLayer && levantamentoLayer.removeLayer(m));
      spiderfied.lines.forEach(l => levantamentoLayer && levantamentoLayer.removeLayer(l));
      spiderfied = null;
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Triangle marker via canvas — reaproveita L.CircleMarker mas desenha
    // um triangulo equilatero (overhead identico ao L.circleMarker).
    // ─────────────────────────────────────────────────────────────────────────
    L.Canvas.include({
      _updateTriangle(layer) {
        if (!this._drawing || layer._empty()) return;
        const p = layer._point;
        const r = Math.max(Math.round(layer._radius), 1);
        // Triangulo equilatero inscrito no circulo de raio r, vertice para cima.
        const sin60 = 0.8660254;
        const ctx = this._ctx;
        ctx.beginPath();
        ctx.moveTo(p.x,           p.y - r);
        ctx.lineTo(p.x + r * sin60, p.y + r * 0.5);
        ctx.lineTo(p.x - r * sin60, p.y + r * 0.5);
        ctx.closePath();
        this._fillStroke(ctx, layer);
      }
    });

    const TriangleMarker = L.CircleMarker.extend({
      _updatePath() { this._renderer._updateTriangle(this); }
    });

    function triangleMarker(latlng, opts) {
      return new TriangleMarker(latlng, opts);
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Filtro de data no levantamento
    // ─────────────────────────────────────────────────────────────────────────
    function parseDataRegistro(s) {
      // Formato gerado pelo backend: "dd/mm/yyyy HH:MM:SS"
      if (!s) return null;
      const m = String(s).trim().match(
        /^(\d{1,2})\/(\d{1,2})\/(\d{4})(?:\s+(\d{1,2}):(\d{2})(?::(\d{2}))?)?/
      );
      if (!m) return null;
      const d = parseInt(m[1], 10);
      const mo = parseInt(m[2], 10) - 1;
      const y = parseInt(m[3], 10);
      const hh = parseInt(m[4] || "0", 10);
      const mm = parseInt(m[5] || "0", 10);
      const ss = parseInt(m[6] || "0", 10);
      const dt = new Date(y, mo, d, hh, mm, ss);
      return isNaN(dt.getTime()) ? null : dt;
    }

    function startOfDay(d) {
      return new Date(d.getFullYear(), d.getMonth(), d.getDate());
    }

    function fmtData(d) {
      if (!d) return "—";
      const dd = String(d.getDate()).padStart(2, "0");
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      return `${dd}/${mm}/${d.getFullYear()}`;
    }

    function configurarRangeData(pontos) {
      const wrap = document.getElementById("data-range-wrap");
      const datas = [];
      for (const p of pontos) {
        const d = parseDataRegistro(p.DATA_REGISTRO);
        if (d) datas.push(startOfDay(d).getTime());
      }
      if (datas.length === 0) {
        wrap.classList.remove("show");
        dataMin = dataMax = dataAte = null;
        return;
      }
      const minT = Math.min(...datas);
      const maxT = Math.max(...datas);
      dataMin = new Date(minT);
      dataMax = new Date(maxT);
      dataAte = new Date(maxT);
      const range = document.getElementById("data-range");
      const totalDias = Math.max(1, Math.round((maxT - minT) / 86400000));
      range.min = "0";
      range.max = String(totalDias);
      range.value = String(totalDias);
      document.getElementById("data-range-min").textContent = fmtData(dataMin);
      document.getElementById("data-range-max").textContent = fmtData(dataMax);
      document.getElementById("data-range-cur").textContent = fmtData(dataAte);
      wrap.classList.add("show");
    }

    function pontoDentroDoFiltroData(p) {
      if (!dataAte) return true;
      const d = parseDataRegistro(p.DATA_REGISTRO);
      if (!d) return true;  // sem data -> nao filtra
      return startOfDay(d).getTime() <= startOfDay(dataAte).getTime();
    }

    function aplicarFiltroData() {
      if (!levantamentoLayer) return;
      unspiderfy();
      // Para cada grupo de coordenada, exibe apenas se algum ponto passa o filtro.
      // Reusa stackGroups + levantamentoMarkers.
      for (const [k, info] of levantamentoMarkers) {
        const grupo = info.group;
        const visiveis = grupo.filter(pontoDentroDoFiltroData);
        if (visiveis.length === 0) {
          if (info.layer && levantamentoLayer.hasLayer(info.layer)) {
            levantamentoLayer.removeLayer(info.layer);
          }
        } else {
          if (info.layer && !levantamentoLayer.hasLayer(info.layer)) {
            info.layer.addTo(levantamentoLayer);
          }
        }
      }
    }

    function onDataRangeInput() {
      if (!dataMin) return;
      const dias = parseInt(document.getElementById("data-range").value, 10) || 0;
      dataAte = new Date(dataMin.getTime() + dias * 86400000);
      document.getElementById("data-range-cur").textContent = fmtData(dataAte);
      aplicarFiltroData();
    }

    // Map type switcher (cycle entre dark / claro / satelite)

    function cicloMapType() {

    // ─────────────────────────────────────────────────────────────────────────
    // Exportar dados — gera KML local + baixa raw files do servidor
    // ─────────────────────────────────────────────────────────────────────────
    function escapeXml(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&apos;");
    }

    function pontosVisiveisParaExport() {
      return levantamentoPontos.filter(pontoDentroDoFiltroData);
    }

    function geomToKmlCoords(geom) {
      const ringToStr = ring => ring
        .map(c => `${c[0]},${c[1]}`).join(" ");
      const polyToKml = (rings) => {
        const outer = ringToStr(rings[0] || []);
        const inners = (rings.slice(1) || [])
          .map(r => `<innerBoundaryIs><LinearRing><coordinates>${ringToStr(r)}</coordinates></LinearRing></innerBoundaryIs>`)
          .join("");
        return `<Polygon><outerBoundaryIs><LinearRing><coordinates>${outer}</coordinates></LinearRing></outerBoundaryIs>${inners}</Polygon>`;
      };
      if (!geom) return "";
      if (geom.type === "Polygon") return polyToKml(geom.coordinates);
      if (geom.type === "MultiPolygon") {
        return `<MultiGeometry>${geom.coordinates.map(polyToKml).join("")}</MultiGeometry>`;
      }
      return "";
    }

    function gerarKmlPontos(pontos, nome) {
      const placemarks = pontos.map(p => {
        const id = escapeXml(p.ID_PONTO || "");
        const desc = COLUNAS_LEVANTAMENTO
          .filter(c => p[c] !== undefined && p[c] !== "")
          .map(c => `${c}: ${p[c]}`).join("\n");
        return `<Placemark><name>${id}</name><description>${escapeXml(desc)}</description>` +
               `<Point><coordinates>${p.lng},${p.lat}</coordinates></Point></Placemark>`;
      }).join("");
      return `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>${escapeXml(nome)}</name>${placemarks}</Document></kml>`;
    }

    function gerarKmlBorda(feature, nome) {
      const geom = feature && feature.geometry;
      const kmlGeom = geomToKmlCoords(geom);
      return `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>${escapeXml(nome)} - Borda</name>` +
        `<Placemark><name>${escapeXml(nome)}</name>${kmlGeom}</Placemark></Document></kml>`;
    }

    function gerarKmlAreas(features, nome) {
      const placemarks = features.map((f, i) => {
        const g = geomToKmlCoords(f.geometry);
        return `<Placemark><name>Area inacessivel ${i + 1}</name>${g}</Placemark>`;
      }).join("");
      return `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>${escapeXml(nome)} - Areas Inacessiveis</name>${placemarks}</Document></kml>`;
    }

    function baixarTexto(filename, conteudo, mime = "application/vnd.google-earth.kml+xml") {
      const blob = new Blob([conteudo], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function slugArquivo(s) {
      return String(s || "EXPORT")
        .normalize("NFD").replace(/[̀-ͯ]/g, "")
        .replace(/[^A-Za-z0-9_-]+/g, "_")
        .replace(/^_+|_+$/g, "") || "EXPORT";
    }

    async function exportarDados() {
      if (!levantamentoMode) return;
      const btn = document.getElementById("btn-download");
      btn.classList.add("loading");
      try {
        const slug = slugArquivo(currentMunicipioNome);
        const pts = pontosVisiveisParaExport();

        // 1) Pontos do levantamento (KML)
        if (pts.length > 0) {
          baixarTexto(
            `${slug}_pontos.kml`,
            gerarKmlPontos(pts, currentMunicipioNome)
          );
        }

        // 2) Borda do municipio (KML)
        const featBorda = selectedLayer && selectedLayer.feature;
        if (featBorda) {
          baixarTexto(
            `${slug}_borda.kml`,
            gerarKmlBorda(featBorda, currentMunicipioNome)
          );
        }

        // 3) Areas inacessiveis (KML) — apenas se ja carregadas (toggle ativado)
        if (areasFeatures && areasFeatures.length > 0) {
          baixarTexto(
            `${slug}_areas_inacessiveis.kml`,
            gerarKmlAreas(areasFeatures, currentMunicipioNome)
          );
        }

        // 4) Transformadores (KML gerado) — apenas se ja carregados
        if (transformadoresPontos && transformadoresPontos.length > 0) {
          const trafosKml = gerarKmlPontos(
            transformadoresPontos.map(p => ({ ID_PONTO: "TRAFO", lat: p.lat, lng: p.lng })),
            `${currentMunicipioNome} - Transformadores`
          );
          baixarTexto(`${slug}_transformadores.kml`, trafosKml);
        }

        // 5) Arquivos brutos (gpkg + kmls de LOTES) via backend, em um ZIP
        try {
          const rz = await fetch(`${API}/export/${encodeURIComponent(currentLevantamentoKey)}`);
          if (rz.ok) {
            const blob = await rz.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `${slug}_raw.zip`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            setTimeout(() => URL.revokeObjectURL(url), 1000);
          }
        } catch (e) {
          console.warn("Sem arquivos brutos para exportar:", e);
        }
      } catch (e) {
        console.error("Erro ao exportar:", e);
        alert("Erro ao exportar: " + e.message);
      } finally {
        btn.classList.remove("loading");
      }
    }

    function escapeHtml(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    function renderObsCell(texto, limite = 150) {
      const t = String(texto || "");
      if (t.length <= limite) return escapeHtml(t);
      const short = escapeHtml(t.slice(0, limite)) + "…";
      const full  = escapeHtml(t);
      // truque: armazena ambos em data-attrs e o JS troca on click
      return `<span class="obs-wrap" data-short="${short}" data-full="${full}" data-state="short">${short}`
           + ` <span class="point-obs-toggle">Ver mais</span></span>`;
    }

    function mostrarPontoNoPainel(p) {
      const linhas = [];
      linhas.push(`<div class="point-titulo">Ponto ${escapeHtml(p.ID_PONTO || "—")}</div>`);
      for (const col of COLUNAS_LEVANTAMENTO) {
        const valor = p[col];
        if (valor === undefined) continue;
        let valHtml;
        if (col === "LINK_RELATORIO" && valor) {
          valHtml = `<a href="${escapeHtml(valor)}" target="_blank" rel="noopener">abrir</a>`;
        } else if (col === "OBSERVACAO") {
          valHtml = renderObsCell(valor);
        } else {
          valHtml = escapeHtml(valor) || "<span style='color:var(--muted)'>—</span>";
        }
        linhas.push(
          `<div class="point-row">
             <span class="point-label">${col}</span>
             <span class="point-value">${valHtml}</span>
           </div>`
        );
      }
      const card = document.getElementById("card-municipio");
      card.innerHTML = linhas.join("");
    }

    // Toggle "Ver mais" / "Ver menos" via event delegation no card
    document.getElementById("card-municipio").addEventListener("click", (e) => {
      const toggle = e.target.closest(".point-obs-toggle");
      if (!toggle) return;
      const wrap = toggle.parentElement;
      if (!wrap || !wrap.classList.contains("obs-wrap")) return;
      const state = wrap.dataset.state;
      if (state === "short") {
        wrap.innerHTML = wrap.dataset.full + ` <span class="point-obs-toggle">Ver menos</span>`;
        wrap.dataset.state = "full";
      } else {
        wrap.innerHTML = wrap.dataset.short + ` <span class="point-obs-toggle">Ver mais</span>`;
        wrap.dataset.state = "short";
      }
    });

    function sairLevantamento() {
      unspiderfy();
      if (levantamentoLayer) {
        map.removeLayer(levantamentoLayer);
        levantamentoLayer = null;
      }
      if (currentOutlineLayer) {
        map.removeLayer(currentOutlineLayer);
        currentOutlineLayer = null;
      }
      if (transformadoresLayer) {
        map.removeLayer(transformadoresLayer);
        transformadoresLayer = null;
      }
      transformadoresPontos = [];
      transformadoresAtivos = false;
      const btnTrafo = document.getElementById("btn-transformadores");
      btnTrafo.classList.remove("show", "ativo", "loading");

      if (areasLayer) {
        map.removeLayer(areasLayer);
        areasLayer = null;
      }
      areasFeatures = [];
      areasAtivas = false;
      document.getElementById("btn-areas").classList.remove("show", "ativo", "loading");
      document.getElementById("btn-download").classList.remove("show", "loading");
      document.getElementById("data-range-wrap").classList.remove("show");
      dataMin = dataMax = dataAte = null;

      levantamentoPontos = [];
      stackGroups = null;
      levantamentoMarkers = new Map();

      if (geojsonLayer && !map.hasLayer(geojsonLayer)) geojsonLayer.addTo(map);
      if (regionaisLayer && !map.hasLayer(regionaisLayer)) regionaisLayer.addTo(map);

      map.setMaxBounds(CE_BOUNDS.pad(0.35));
      map.flyToBounds(CE_BOUNDS, { duration: 0.6 });

      document.getElementById("btn-exit-levantamento").classList.remove("show");
      document.getElementById("btn-levantamento").classList.remove("ativo");
      levantamentoMode = false;

      // Restaura o card do município selecionado, se ainda houver
      if (selectedLayer) {
        if (selectedIbge) {
          const props = selectedLayer.feature ? selectedLayer.feature.properties : {};
          const nome = props.Municipio || props.NM_MUN || currentMunicipioNome;
          selecionarMunicipio(selectedIbge, nome, selectedLayer);
        } else if (currentLevantamentoKey) {
          selecionarRegional(currentLevantamentoKey, selectedLayer);
        }
      } else {
        document.getElementById("card-municipio").innerHTML =
          `<div class="placeholder"><em>🗺️</em>Clique em um município<br>para ver detalhes</div>`;
      }
    }

    // Fecha spiderfy quando o usuário interage com o mapa
    map.on("click zoomstart movestart", () => unspiderfy());

    // Listeners de UI
    document.getElementById("btn-levantamento").addEventListener("click", abrirModalLevantamento);
    document.getElementById("modal-cancel").addEventListener("click", fecharModal);
    document.getElementById("modal-confirm").addEventListener("click", entrarLevantamento);
    document.getElementById("modal-confirma").addEventListener("click", (e) => {
      if (e.target.id === "modal-confirma") fecharModal();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        const overlay = document.getElementById("modal-confirma");
        if (overlay.classList.contains("show")) fecharModal();
      }
    });
    document.getElementById("btn-exit-levantamento").addEventListener("click", sairLevantamento);
    document.getElementById("btn-transformadores").addEventListener("click", toggleTransformadores);
    document.getElementById("btn-areas").addEventListener("click", toggleAreasInacessiveis);
    document.getElementById("btn-download").addEventListener("click", exportarDados);
    document.getElementById("btn-maptype").addEventListener("click", cicloMapType);
    document.getElementById("data-range").addEventListener("input", onDataRangeInput);

    // ════════════════════════════════════════════════════════════
    // INIT
    // ════════════════════════════════════════════════════════════
    (async () => {
      await Promise.all([carregarGeojson(), carregarRegionais(), carregarDados()]);
      renderizarLegenda();
    })();
  </script>
</body>
